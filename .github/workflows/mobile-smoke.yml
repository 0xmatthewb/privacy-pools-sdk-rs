name: mobile-smoke

on:
  pull_request:
    paths:
      - ".github/workflows/mobile-smoke.yml"
      - ".github/actions/install-rust-ci-tools/**"
      - "bindings/**"
      - "crates/**"
      - "examples/react-native-app-smoke/**"
      - "fixtures/**"
      - "packages/react-native/**"
      - "packages/sdk/**"
      - "xtask/**"
      - "Cargo.toml"
      - "Cargo.lock"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ios_mobile_smoke:
    name: ios-mobile-smoke
    continue-on-error: true
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # 1.93.0
        with:
          toolchain: 1.93.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22"
      - uses: ./.github/actions/npm-ci-retry
        with:
          working-directory: packages/sdk
      - name: select xcode 16.4
        run: |
          sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer
          xcodebuild -version
      - run: rustup target add aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios
      - id: package_prep
        name: package/build prep
        run: cargo run -p xtask -- react-native-package --release --with-ios-native
      - name: package surface checks
        if: ${{ steps.package_prep.outcome == 'success' }}
        run: |
          test -f packages/react-native/ios/generated/PrivacyPoolsSdkFFI.h
          test -f packages/react-native/ios/generated/PrivacyPoolsSdkFFI.modulemap
          test -f packages/react-native/ios/frameworks/PrivacyPoolsSdkFFI.xcframework/Info.plist
          cd packages/react-native && npm pack --dry-run --json
      - id: native_smoke
        name: native smoke
        if: ${{ steps.package_prep.outcome == 'success' }}
        continue-on-error: true
        run: >
          cargo run -p xtask -- mobile-smoke-local
          --platform ios
          --surface native
          --out-dir target/mobile-smoke-local
      - id: react_native_smoke
        name: react native smoke
        if: ${{ steps.package_prep.outcome == 'success' }}
        continue-on-error: true
        run: >
          cargo run -p xtask -- mobile-smoke-local
          --platform ios
          --surface react-native
          --out-dir target/mobile-smoke-local
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: mobile-native-report-ios
          path: target/mobile-smoke-local/ios-native/report.json
          if-no-files-found: ignore
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: mobile-react-native-report-ios
          path: target/mobile-smoke-local/ios-react-native/ios-app-report.json
          if-no-files-found: ignore
      - name: fail if any mobile surface failed
        if: ${{ always() && (steps.package_prep.outcome != 'success' || steps.native_smoke.outcome == 'failure' || steps.react_native_smoke.outcome == 'failure') }}
        run: exit 1

  android_mobile_smoke:
    name: android-mobile-smoke
    continue-on-error: true
    runs-on: ubuntu-22.04
    timeout-minutes: 75
    env:
      API_LEVEL: "35"
      TARGET: google_apis
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # 1.93.0
        with:
          toolchain: 1.93.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22"
      - uses: ./.github/actions/npm-ci-retry
        with:
          working-directory: packages/sdk
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6
        with:
          gradle-version: "8.10.2"
      - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4
      - name: enable kvm access
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - run: rustup target add armv7-linux-androideabi aarch64-linux-android x86_64-linux-android
      - run: yes | sdkmanager --licenses
      - run: sdkmanager "ndk;27.1.12297006"
      - name: install mobile ci tools
        uses: ./.github/actions/install-rust-ci-tools
        with:
          profile: mobile
      - run: |
          NDK_ROOT="${ANDROID_SDK_ROOT:-$ANDROID_HOME}/ndk/27.1.12297006"
          echo "ANDROID_NDK_HOME=$NDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$NDK_ROOT" >> "$GITHUB_ENV"
      - id: package_prep
        name: package/build prep
        run: cargo run -p xtask -- react-native-package --release --with-android-native
      - name: package surface checks
        if: ${{ steps.package_prep.outcome == 'success' }}
        run: |
          test -f packages/react-native/android/src/main/jniLibs/armeabi-v7a/libprivacy_pools_sdk_ffi.so
          test -f packages/react-native/android/src/main/jniLibs/arm64-v8a/libprivacy_pools_sdk_ffi.so
          test -f packages/react-native/android/src/main/jniLibs/x86_64/libprivacy_pools_sdk_ffi.so
          cd packages/react-native && npm pack --dry-run --json
      - name: AVD cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ env.API_LEVEL }}-${{ env.TARGET }}-v1
      - id: android_native_smoke
        name: native smoke
        if: ${{ steps.package_prep.outcome == 'success' }}
        continue-on-error: true
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2
        with:
          api-level: ${{ env.API_LEVEL }}
          arch: x86_64
          target: ${{ env.TARGET }}
          script: cd "$GITHUB_WORKSPACE" && cargo run -p xtask -- mobile-smoke-local --platform android --surface native --out-dir "$GITHUB_WORKSPACE/target/mobile-smoke-local"
      - id: android_react_native_smoke
        name: react native smoke
        if: ${{ steps.package_prep.outcome == 'success' }}
        continue-on-error: true
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2
        with:
          api-level: ${{ env.API_LEVEL }}
          arch: x86_64
          target: ${{ env.TARGET }}
          script: cd "$GITHUB_WORKSPACE" && cargo run -p xtask -- mobile-smoke-local --platform android --surface react-native --out-dir "$GITHUB_WORKSPACE/target/mobile-smoke-local"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: mobile-native-report-android
          path: target/mobile-smoke-local/android-native/report.json
          if-no-files-found: ignore
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: mobile-react-native-report-android
          path: target/mobile-smoke-local/android-react-native/android-app-report.json
          if-no-files-found: ignore
      - name: fail if any mobile surface failed
        if: ${{ always() && (steps.package_prep.outcome != 'success' || steps.android_native_smoke.outcome == 'failure' || steps.android_react_native_smoke.outcome == 'failure') }}
        run: exit 1

  evidence:
    continue-on-error: true
    if: always()
    needs:
      - ios_mobile_smoke
      - android_mobile_smoke
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        continue-on-error: true
        with:
          name: mobile-native-report-ios
          path: target/mobile-smoke-inputs/ios-native
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        continue-on-error: true
        with:
          name: mobile-react-native-report-ios
          path: target/mobile-smoke-inputs/ios-react-native
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        continue-on-error: true
        with:
          name: mobile-native-report-android
          path: target/mobile-smoke-inputs/android-native
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        continue-on-error: true
        with:
          name: mobile-react-native-report-android
          path: target/mobile-smoke-inputs/android-react-native
      - name: Normalize mobile smoke inputs
        env:
          IOS_RESULT: ${{ needs.ios_mobile_smoke.result }}
          ANDROID_RESULT: ${{ needs.android_mobile_smoke.result }}
        run: |
          node - <<'EOF'
          const { existsSync, mkdirSync, writeFileSync } = require("node:fs");
          const { dirname } = require("node:path");

          function defaultReport(runtime, platform, surface, jobResult) {
            return {
              generatedAt: new Date().toISOString(),
              runtime,
              platform,
              surface,
              smoke: {
                backend: "unknown",
                commitmentVerified: false,
                withdrawalVerified: false,
                executionSubmitted: false,
                signedManifestVerified: false,
                wrongSignedManifestPublicKeyRejected: false,
                tamperedSignedManifestArtifactsRejected: false,
                tamperedProofRejected: false,
                handleKindMismatchRejected: false,
                staleVerifiedProofHandleRejected: false,
                staleCommitmentSessionRejected: false,
                staleWithdrawalSessionRejected: false,
                wrongRootRejected: false,
                wrongChainIdRejected: false,
                wrongCodeHashRejected: false,
                wrongSignerRejected: false,
              },
              parity: {
                totalChecks: 1,
                passed: 0,
                failed: 1,
                failedChecks: [`missing ${platform} ${surface} smoke report artifact (${jobResult})`],
              },
              benchmark: {
                artifactResolutionMs: 0,
                bundleVerificationMs: 0,
                sessionPreloadMs: 0,
                firstInputPreparationMs: 0,
                firstWitnessGenerationMs: 0,
                firstProofGenerationMs: 0,
                firstVerificationMs: 0,
                firstProveAndVerifyMs: 0,
                iterations: 1,
                warmup: 0,
                peakResidentMemoryBytes: null,
                samples: [{
                  inputPreparationMs: 0,
                  witnessGenerationMs: 0,
                  proofGenerationMs: 0,
                  verificationMs: 0,
                  proveAndVerifyMs: 0,
                }],
              },
            };
          }

          function ensureReport(path, runtime, platform, surface, jobResult) {
            if (existsSync(path)) {
              return;
            }

            mkdirSync(dirname(path), { recursive: true });
            writeFileSync(
              path,
              `${JSON.stringify(defaultReport(runtime, platform, surface, jobResult), null, 2)}\n`,
            );
          }

          ensureReport(
            "target/mobile-smoke-inputs/ios-native/report.json",
            "native",
            "ios",
            "native",
            process.env.IOS_RESULT || "missing",
          );
          ensureReport(
            "target/mobile-smoke-inputs/ios-react-native/ios-app-report.json",
            "react-native-app",
            "ios",
            "react-native",
            process.env.IOS_RESULT || "missing",
          );
          ensureReport(
            "target/mobile-smoke-inputs/android-native/report.json",
            "native",
            "android",
            "native",
            process.env.ANDROID_RESULT || "missing",
          );
          ensureReport(
            "target/mobile-smoke-inputs/android-react-native/android-app-report.json",
            "react-native-app",
            "android",
            "react-native",
            process.env.ANDROID_RESULT || "missing",
          );
          EOF

          node ./packages/sdk/scripts/assemble-mobile-smoke-evidence.mjs \
            --ios-native-report target/mobile-smoke-inputs/ios-native/report.json \
            --ios-react-native-report target/mobile-smoke-inputs/ios-react-native/ios-app-report.json \
            --android-native-report target/mobile-smoke-inputs/android-native/report.json \
            --android-react-native-report target/mobile-smoke-inputs/android-react-native/android-app-report.json \
            --commit "${{ github.sha }}" \
            --source github-workflow \
            --workflow mobile-smoke \
            --workflow-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --out-dir target/mobile-smoke-evidence
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: mobile-smoke-evidence
          path: target/mobile-smoke-evidence
