name: mobile-smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1"

jobs:
  react-native-release-ios:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: rustup target add aarch64-apple-ios aarch64-apple-ios-sim
      - run: cargo run -p xtask -- react-native-package --release --with-ios-native
      - run: bindings/ios/scripts/run-smoke-xctest.sh
      - run: cargo run -p xtask -- react-native-app-smoke-ios
      - run: test -f packages/react-native/ios/generated/PrivacyPoolsSdkFFI.h
      - run: test -f packages/react-native/ios/generated/PrivacyPoolsSdkFFI.modulemap
      - run: test -f packages/react-native/ios/frameworks/PrivacyPoolsSdkFFI.xcframework/Info.plist
      - run: npm pack --dry-run --json
        working-directory: packages/react-native

  react-native-release-android:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.10.2"
      - uses: android-actions/setup-android@v4
      - run: rustup target add armv7-linux-androideabi aarch64-linux-android x86_64-linux-android
      - run: yes | sdkmanager --licenses
      - run: sdkmanager "ndk;27.1.12297006"
      - run: cargo install --locked cargo-ndk
      - run: |
          NDK_ROOT="${ANDROID_SDK_ROOT:-$ANDROID_HOME}/ndk/27.1.12297006"
          echo "ANDROID_NDK_HOME=$NDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$NDK_ROOT" >> "$GITHUB_ENV"
      - run: cargo run -p xtask -- react-native-package --release --with-android-native
      - uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          target: google_apis
          script: |
            cd bindings/android && gradle connectedDebugAndroidTest --stacktrace
            cd "$GITHUB_WORKSPACE" && cargo run -p xtask -- react-native-app-smoke-android
      - run: test -f packages/react-native/android/src/main/jniLibs/armeabi-v7a/libprivacy_pools_sdk_ffi.so
      - run: test -f packages/react-native/android/src/main/jniLibs/arm64-v8a/libprivacy_pools_sdk_ffi.so
      - run: test -f packages/react-native/android/src/main/jniLibs/x86_64/libprivacy_pools_sdk_ffi.so
      - run: npm pack --dry-run --json
        working-directory: packages/react-native
