name: toolchain-canary

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  next-stable-clippy:
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: clippy
      - name: clippy on stable
        id: clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - name: File advisory issue if next-stable fails
        if: failure()
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          today="$(date +%F)"
          title="toolchain-canary: clippy failed on stable (${today})"
          body="Upcoming toolchain bump will break. See run ${RUN_URL}."
          curl --fail --silent --show-error \
            -X POST \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPOSITORY}/issues" \
            -d "$(printf '{"title":"%s","body":"%s","labels":["ci","toolchain"]}' "${title}" "${body}")"
