name: ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: rustup target add wasm32-unknown-unknown
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace
      - run: cargo test --doc --workspace
      - run: cargo install --locked cargo-hack
      - run: cargo run -p xtask -- examples-check
      - run: cargo run -p xtask -- feature-check
      - run: cargo run -p xtask -- package-check
      - run: cargo run -p xtask -- bindings
      - run: git diff --exit-code -- bindings/ios/generated bindings/android/generated
      - run: cargo install --locked cargo-deny cargo-audit
      - run: cargo deny check bans licenses sources advisories
      - run: cargo run -p xtask -- dependency-check

  react-native:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: cargo run -p xtask -- react-native-package
      - run: test -z "$(git status --short --untracked-files=all -- packages/react-native/android/generated packages/react-native/android/src/main/kotlin packages/react-native/ios/generated)"
      - run: npm pack --dry-run --json
        working-directory: packages/react-native

  sdk:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: rustup target add wasm32-unknown-unknown
      - run: cargo install --locked wasm-bindgen-cli
      - run: sudo apt-get update && sudo apt-get install -y binaryen
      - run: npm ci
        working-directory: packages/sdk
      - run: npx playwright install --with-deps chromium
        working-directory: packages/sdk
      - run: cargo run -p xtask -- sdk-smoke
      - run: npm pack --dry-run --json
        working-directory: packages/sdk

  react-native-sample-app:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: cargo run -p xtask -- react-native-smoke
