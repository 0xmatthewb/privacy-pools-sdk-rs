name: ci

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  rust-core:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # 1.93.0
        with:
          toolchain: 1.93.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: rust core assurance
        run: >
          cargo run -p xtask -- assurance --profile pr --runtime rust
          --only-checks
          rust-fmt,rust-clippy,cargo-test-workspace,cargo-test-doc-workspace,rust-malformed-input-check,rust-secret-hardening-check,rust-verified-proof-safety-check,rust-chain-rejection-checks
          --out-dir target/assurance-pr-rust-core
      - name: print rust core findings on failure
        if: failure()
        run: |
          if [ -f target/assurance-pr-rust-core/findings.md ]; then
            tail -n 200 target/assurance-pr-rust-core/findings.md
          fi
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: assurance-pr-rust-core
          path: target/assurance-pr-rust-core
          if-no-files-found: warn

  rust-generated:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # 1.93.0
        with:
          toolchain: 1.93.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22"
      - run: npm ci
        working-directory: packages/sdk
      - name: rust wasm target setup
        run: rustup target add wasm32-unknown-unknown
      - name: install rust generated tools
        uses: ./.github/actions/install-rust-ci-tools
        with:
          profile: rust-generated
      - name: rust v1 parity
        run: npm run compare:v1-rust
        working-directory: packages/sdk
      - name: rust generated assurance
        run: >
          cargo run -p xtask -- assurance --profile pr --runtime rust
          --only-checks
          feature-check,compare-rust-goldens-rust,examples-check,bindings-generate,bindings-drift-check
          --out-dir target/assurance-pr-rust-generated
      - name: print rust generated findings on failure
        if: failure()
        run: |
          if [ -f target/assurance-pr-rust-generated/findings.md ]; then
            tail -n 200 target/assurance-pr-rust-generated/findings.md
          fi
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: assurance-pr-rust-generated
          path: target/assurance-pr-rust-generated
          if-no-files-found: warn

  rust-policy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # 1.93.0
        with:
          toolchain: 1.93.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: install rust policy tools
        uses: ./.github/actions/install-rust-ci-tools
        with:
          profile: rust-policy
      - name: select rust policy checks
        id: rust-policy-checks
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          checks=(
            package-check
            dependency-check
            artifact-fingerprints
            signed-manifest-sample-check
            cargo-deny-policy
          )

          if [ "$EVENT_NAME" = "pull_request" ]; then
            changed_files="$(git diff --name-only "origin/$BASE_REF...HEAD")"
            printf '%s\n' "$changed_files"

            if printf '%s\n' "$changed_files" | grep -Eq '^(docs/|README\.md$|RELEASE_CHECKLIST\.md$|SECURITY\.md$|deny\.toml$|security/)'; then
              checks+=(docs-check)
            fi

            if printf '%s\n' "$changed_files" | grep -Eq '^\.github/'; then
              checks+=(zizmor)
            fi
          else
            checks+=(docs-check zizmor)
          fi

          {
            printf 'checks='
            IFS=,
            printf '%s' "${checks[*]}"
            printf '\n'
          } >> "$GITHUB_OUTPUT"

          printf 'selected rust policy checks: %s\n' "${checks[*]}"
      - name: rust policy assurance
        env:
          RUST_POLICY_CHECKS: ${{ steps.rust-policy-checks.outputs.checks }}
        run: >
          cargo run -p xtask -- assurance --profile pr --runtime rust
          --only-checks
          "$RUST_POLICY_CHECKS"
          --out-dir target/assurance-pr-rust-policy
      - name: print rust policy findings on failure
        if: failure()
        run: |
          if [ -f target/assurance-pr-rust-policy/findings.md ]; then
            tail -n 200 target/assurance-pr-rust-policy/findings.md
          fi
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: assurance-pr-rust-policy
          path: target/assurance-pr-rust-policy
          if-no-files-found: warn

  rust:
    name: rust
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - rust-core
      - rust-generated
      - rust-policy
    if: always()
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # 1.93.0
        with:
          toolchain: 1.93.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: download rust core assurance artifact
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: assurance-pr-rust-core
          path: target/assurance-merge-inputs/assurance-pr-rust-core
      - name: download rust generated assurance artifact
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: assurance-pr-rust-generated
          path: target/assurance-merge-inputs/assurance-pr-rust-generated
      - name: download rust policy assurance artifact
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: assurance-pr-rust-policy
          path: target/assurance-merge-inputs/assurance-pr-rust-policy
      - name: merge rust assurance
        run: >
          cargo run -p xtask -- assurance-merge --profile pr --runtime rust
          --inputs target/assurance-merge-inputs/assurance-pr-rust-core
          --inputs target/assurance-merge-inputs/assurance-pr-rust-generated
          --inputs target/assurance-merge-inputs/assurance-pr-rust-policy
          --out-dir target/assurance-pr-rust
      - name: print merged rust findings on failure
        if: failure()
        run: |
          if [ -f target/assurance-pr-rust/findings.md ]; then
            tail -n 200 target/assurance-pr-rust/findings.md
          fi
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: failure()
        with:
          name: assurance-pr-rust
          path: target/assurance-pr-rust

  rust-fuzz-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # nightly-2026-04-15
        with:
          toolchain: nightly-2026-04-15
          components: rust-src
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: install fuzz tools
        uses: ./.github/actions/install-rust-ci-tools
        with:
          profile: fuzz
      - name: fuzz smoke
        run: >
          cargo run -p xtask -- assurance --profile nightly --runtime rust
          --only-checks
          fuzz-field_parsing,fuzz-wire_conversion,fuzz-proof_bundle_parsing,fuzz-manifest_parsing,fuzz-json_boundaries,fuzz-artifact_bundle_resolution,fuzz-session_invalidation,fuzz-execution_policy_inputs,fuzz-groth16_verifier_fuzz,fuzz-relay_data_abi_fuzz,fuzz-merkle_proof_tamper_fuzz
          --fuzz-runs 256
          --out-dir target/assurance-pr-fuzz-smoke
      - name: print fuzz findings on failure
        if: failure()
        run: |
          if [ -f target/assurance-pr-fuzz-smoke/findings.md ]; then
            tail -n 200 target/assurance-pr-fuzz-smoke/findings.md
          fi
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: assurance-pr-fuzz-smoke
          path: target/assurance-pr-fuzz-smoke
          if-no-files-found: warn

  default-artifact-symbols:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # 1.93.0
        with:
          toolchain: 1.93.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22"
      - name: install browser ci tools
        uses: ./.github/actions/install-rust-ci-tools
        with:
          profile: browser-pr
      - name: install symbol scan tools
        run: sudo apt-get update && sudo apt-get install -y wabt binutils
      - run: rustup target add wasm32-unknown-unknown
      - run: npm ci
        working-directory: packages/sdk
      - run: npm run build:native:release
        working-directory: packages/sdk
      - run: cargo build -p privacy-pools-sdk-ffi --lib --release --no-default-features
      - run: npm run build:web:release
        working-directory: packages/sdk
      - run: npm run check:default-artifact-symbols
        working-directory: packages/sdk

  solidity-verifier:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # 1.93.0
        with:
          toolchain: 1.93.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: foundry-rs/foundry-toolchain@v1
      - name: rust proof verifies against vendored withdrawal verifier
        run: >
          cargo test -p privacy-pools-sdk --test solidity_verifier
          rust_generated_withdrawal_proof_is_accepted_by_solidity_verifier
          -- --ignored --exact --nocapture

  sdk-node:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # 1.93.0
        with:
          toolchain: 1.93.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22"
      - run: npm ci
        working-directory: packages/sdk
      - run: cargo run -p xtask -- assurance --profile pr --runtime node --out-dir target/assurance-pr-node

  sdk:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # 1.93.0
        with:
          toolchain: 1.93.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22"
      - run: rustup target add wasm32-unknown-unknown
      - name: install browser ci tools
        uses: ./.github/actions/install-rust-ci-tools
        with:
          profile: browser-pr
      - run: npm ci
        working-directory: packages/sdk
      - run: npm run check:generated
        working-directory: packages/sdk
      - name: browser assurance
        run: cargo run -p xtask -- assurance --profile pr --runtime browser --out-dir target/assurance-pr-browser
      - name: print browser findings on failure
        if: failure()
        run: |
          if [ -f target/assurance-pr-browser/findings.md ]; then
            cat target/assurance-pr-browser/findings.md
          fi
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: failure()
        with:
          name: assurance-pr-browser
          path: target/assurance-pr-browser

  react-native:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # 1.93.0
        with:
          toolchain: 1.93.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22"
      - run: cargo run -p xtask -- assurance --profile pr --runtime react-native --out-dir target/assurance-pr-react-native
