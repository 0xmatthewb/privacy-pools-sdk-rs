name: ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace
      - run: cargo run -p xtask -- bindings
      - run: git diff --exit-code -- bindings/ios/generated bindings/android/generated
      - run: cargo install --locked cargo-deny cargo-audit
      - run: cargo deny check bans licenses sources advisories
      - run: cargo audit --ignore RUSTSEC-2025-0055

  react-native:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm pack --dry-run --json
        working-directory: packages/react-native
