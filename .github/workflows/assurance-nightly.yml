name: assurance-nightly

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      mobile_smoke_run_id:
        description: Optional workflow run id for a mobile-smoke-evidence artifact override
        required: false
        type: string
      reference_benchmarks_run_id:
        description: Optional workflow run id for an informational reference-benchmarks-stable artifact
        required: false
        type: string

permissions:
  contents: read

jobs:
  nightly:
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # 1.93.0
        with:
          toolchain: 1.93.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22"
      - run: rustup target add wasm32-unknown-unknown
      - name: install nightly ci tools
        uses: ./.github/actions/install-rust-ci-tools
        with:
          profile: nightly
      - name: install pinned binaryen
        shell: bash
        run: |
          set -euo pipefail
          BINARYEN_VERSION=129
          curl -sSL "https://github.com/WebAssembly/binaryen/releases/download/version_${BINARYEN_VERSION}/binaryen-version_${BINARYEN_VERSION}-x86_64-linux.tar.gz" | tar -xz -C /opt
          export PATH="/opt/binaryen-version_${BINARYEN_VERSION}/bin:$PATH"
          echo "/opt/binaryen-version_${BINARYEN_VERSION}/bin" >> "$GITHUB_PATH"
          wasm-opt --version
      - uses: ./.github/actions/npm-ci-retry
        with:
          working-directory: packages/sdk
      - run: npx playwright install --with-deps chromium
        working-directory: packages/sdk
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mobile_smoke_run_id != '' }}
        with:
          name: mobile-smoke-evidence
          path: target/downloads/manual-mobile-smoke
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.mobile_smoke_run_id }}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.reference_benchmarks_run_id != '' }}
        with:
          name: reference-benchmarks-stable
          path: target/downloads/reference-benchmarks
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.reference_benchmarks_run_id }}
      - name: assemble external evidence
        env:
          GITHUB_EVENT_NAME_INPUT: ${{ github.event_name }}
          MOBILE_SMOKE_RUN_ID_INPUT: ${{ inputs.mobile_smoke_run_id }}
        run: |
          args=(
            run -p xtask -- external-evidence-assemble
            --mode nightly
            --out-dir target/nightly-external-evidence
          )
          if [ "$GITHUB_EVENT_NAME_INPUT" = "workflow_dispatch" ] && [ -n "$MOBILE_SMOKE_RUN_ID_INPUT" ]; then
            args+=(--mobile-evidence-dir target/downloads/manual-mobile-smoke)
          fi
          if [ -d target/downloads/reference-benchmarks ]; then
            args+=(--reference-benchmarks-dir target/downloads/reference-benchmarks)
          fi

          cargo "${args[@]}"
      - name: nightly assurance (non-fuzz)
        run: >
          cargo run -p xtask -- assurance --profile nightly --runtime all
          --skip-fuzz
          --out-dir target/assurance-nightly
          --external-evidence-dir target/nightly-external-evidence
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: assurance-nightly
          path: target/assurance-nightly
