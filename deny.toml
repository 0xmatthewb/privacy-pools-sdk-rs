[advisories]
version = 2
yanked = "deny"
unmaintained = "workspace"
ignore = [
    # Mirrored from security/advisories.toml[cargo_deny].ignore.
    "RUSTSEC-2025-0055",
    "RUSTSEC-2026-0097",
]

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "MIT",
    "MIT-0",
    "MPL-2.0",
    "Unicode-3.0",
    "Zlib",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
